# Application
spring.application.name=agenthub-marketplace
server.port=8085

# Logging
logging.level.root=INFO
logging.level.dev.cezar.agenthub.marketplace=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson
spring.jackson.serialization.indent-output=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# R2DBC (PostgreSQL reactive)
spring.r2dbc.url=r2dbc:postgresql://postgresql.internal:5432/agenthub
spring.r2dbc.username=agenthub
spring.r2dbc.password=agenthub_dev

# PostgreSQL JDBC (Flyway requires synchronous JDBC even in reactive services)
spring.datasource.url=jdbc:postgresql://postgresql.internal:5432/agenthub
spring.datasource.username=agenthub
spring.datasource.password=agenthub_dev
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholder-replacement=false
spring.flyway.locations=classpath:db/migrations/public,classpath:db/migrations/schemas

# Actuator (Health checks + Metrics)
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.show-actuator=false
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# JWT (Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://keycloak.internal:8080/realms/master}
agenthub.keycloak.jwks-uri-template=${KEYCLOAK_JWKS_URI_TEMPLATE:http://keycloak.internal:8080/realms/{tenantId}/protocol/openid-connect/certs}
agenthub.keycloak.issuer-uri-template=${KEYCLOAK_ISSUER_URI_TEMPLATE:http://keycloak.internal:8080/realms/{tenantId}}
